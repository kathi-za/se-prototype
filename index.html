<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Museum Curator - Resource Manager</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #eef2f3; padding: 20px; color: #333; }
        h1 { color: #2c3e50; }
        .game { background: white; padding: 20px; border-radius: 12px; width: 400px; margin: 10px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .market-box { border: 2px solid #3498db; background: #ebf5fb; padding: 15px; border-radius: 8px; margin-top: 15px; }
        button { margin: 5px; padding: 10px 15px; font-size: 14px; cursor: pointer; border-radius: 5px; border: none; background: #3498db; color: white; transition: 0.3s; }
        button:hover { background: #2980b9; }
        button.skip { background: #95a5a6; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; text-align: left; gap: 10px; padding: 10px; }
        .status-msg { font-style: italic; color: #7f8c8d; min-height: 20px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>🏛️ Museum Curator</h1>
    
    <div class="game">
        <div class="stats">
            <div><b>Year:</b> <span id="year">2026</span></div>
            <div><b>Budget:</b> €<span id="budget">50000</span></div>
            <div><b>Artworks:</b> <span id="artCount">0</span></div>
            <div><b>Popularity:</b> <span id="popScore">0</span></div>
            <div><b>Ticket Price:</b> €<span id="ticketPriceDisplay">10</span></div>
            <div><b>Last Year Sales:</b> <span id="soldTickets">0</span></div>
        </div>
    </div>

    <div class="game">
        <h3>Next Acquisition</h3>
        <div id="market-ui" class="market-box">
            <p><b id="artName">Loading...</b></p>
            <p>Cost: €<span id="artCost">0</span></p>
            <p>Popularity: <span id="artPop">0</span></p>
            <button onclick="buyArtwork()">Buy Artwork</button>
            <button class="skip" onclick="generateMarketOffer()">Skip / New Offer</button>
        </div>
        <p class="status-msg" id="message"></p>
    </div>

    <div class="game">
        <label>Set Ticket Price (€): <input type="number" id="newTicketPrice" value="10" min="1" /></label>
        <button onclick="updateTicketPrice()">Update Price</button>
        <hr>
        <button style="background: #27ae60; width: 100%; font-weight: bold;" onclick="endYear()">END YEAR & COLLECT REVENUE</button>
    </div>

    <script>
        let year = 2026;
        let budget = 50000;
        let collection = [];
        let ticketPrice = 10;
        let lastYearSales = 0;
        let currentOffer = null;

        const artNames = ["Mona Lisa's Smile", "The Blue Vase", "Digital Chaos", "Marble Statue", "Ancient Coin", "Post-Modern Splatter", "Golden Sarcophagus", "Royal Portrait"];

        function updateUI() {
            document.getElementById("year").innerText = year;
            document.getElementById("budget").innerText = budget.toLocaleString();
            document.getElementById("artCount").innerText = collection.length;
            document.getElementById("ticketPriceDisplay").innerText = ticketPrice;
            document.getElementById("soldTickets").innerText = lastYearSales;
            
            let totalPop = collection.reduce((sum, art) => sum + art.pop, 0);
            document.getElementById("popScore").innerText = totalPop;
        }

        function generateMarketOffer() {
            let name = artNames[Math.floor(Math.random() * artNames.length)];
            let cost = Math.floor(Math.random() * 15000) + 5000;
            let pop = Math.floor(Math.random() * 50) + 10;
            
            currentOffer = { name, cost, pop };
            
            document.getElementById("artName").innerText = name;
            document.getElementById("artCost").innerText = cost.toLocaleString();
            document.getElementById("artPop").innerText = pop;
            document.getElementById("message").innerText = "A new piece is available!";
        }

        function buyArtwork() {
            if (budget >= currentOffer.cost) {
                budget -= currentOffer.cost;
                collection.push(currentOffer);
                document.getElementById("message").innerText = "Purchased " + currentOffer.name + "!";
                generateMarketOffer();
                updateUI();
            } else {
                alert("Not enough budget!");
            }
        }

        function updateTicketPrice() {
            ticketPrice = parseInt(document.getElementById("newTicketPrice").value);
            updateUI();
        }

        function endYear() {
            year++;
            
            // MATH: Popularity increases visitors, high price decreases them
            let totalPop = collection.reduce((sum, art) => sum + art.pop, 0);
            
            // Logic: Base visitors = total popularity * 10.
            // Then divided by a price factor (e.g., ticketPrice/5)
            let priceFactor = Math.max(0.5, ticketPrice / 10);
            lastYearSales = Math.floor((totalPop * 20) / priceFactor);
            
            // No art = No visitors
            if (collection.length === 0) lastYearSales = 0;

            let revenue = lastYearSales * ticketPrice;
            budget += revenue;

            alert(`Year ${year-1} Results:\nVisitors: ${lastYearSales}\nRevenue: €${revenue.toLocaleString()}`);

            // Win/Loss conditions
            if (budget >= 1000000) {
                alert("Congratulations! Your museum is world-class and self-sufficient!");
                resetGame();
            } else if (budget <= 0 && collection.length === 0) {
                alert("Bankruptcy! Your museum has closed down.");
                resetGame();
            }

            generateMarketOffer();
            updateUI();
        }

        function resetGame() {
            year = 2026;
            budget = 50000;
            collection = [];
            ticketPrice = 10;
            lastYearSales = 0;
            generateMarketOffer();
            updateUI();
        }

        // Initialize
        generateMarketOffer();
        updateUI();
    </script>
</body>
</html>
